[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Serverless functions (Twilio SMS, Retell webhook, scheduled reminders).
# These deploy automatically with the site; add the TWILIO_* / SUPABASE_* env
# vars in the Netlify UI to turn them on.
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# SPA fallback so client-side routes (React Router) resolve on refresh / deep links.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers (defense-in-depth for a HIPAA-ready product).
# The connect-src allows Supabase; script/style are kept to self + inline
# (Vite injects a small inline module) and the Google Fonts hosts used in
# index.html. Tighten further once you self-host fonts.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"

# Long-cache the fingerprinted build assets.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
